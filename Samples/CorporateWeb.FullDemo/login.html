<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MegaForm — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f5f7fb;--card:#ffffff;--line:#e7ebf3;--text:#0f172a;--muted:#667085;--primary:#2563eb;--danger:#dc2626;}
  *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#e7efff 0,#f5f7fb 42%,#eef2ff 100%);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px} 
  .mf-auth{width:min(100%,420px);background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.55);border-radius:24px;box-shadow:0 18px 60px rgba(15,23,42,.14);padding:28px} 
  .mf-brand{display:flex;align-items:center;gap:14px;margin-bottom:18px} .mf-logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 10px 30px rgba(37,99,235,.28)}
  .mf-title{font-size:24px;font-weight:800;line-height:1.1;margin:0} .mf-sub{margin:6px 0 0;color:var(--muted);font-size:14px} .mf-alert{margin:0 0 14px;border:1px solid #fecaca;background:#fef2f2;color:var(--danger);padding:12px 14px;border-radius:14px;font-size:14px}
  .mf-field{display:flex;flex-direction:column;gap:8px;margin:0 0 16px} .mf-label{font-size:13px;font-weight:700;color:#344054} .mf-input{width:100%;height:48px;border-radius:14px;border:1px solid var(--line);padding:0 14px;font-size:14px;outline:none;background:#fff;transition:border-color .15s ease, box-shadow .15s ease}.mf-input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
  .mf-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:0 0 18px}.mf-check{display:flex;align-items:center;gap:8px;color:#475467;font-size:14px}.mf-btn{width:100%;height:48px;border:none;border-radius:14px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 14px 32px rgba(37,99,235,.24)}
  .mf-foot{margin-top:16px;color:#667085;font-size:13px;text-align:center}
</style>
</head>
<body>
  <div class="mf-auth">
    <div class="mf-brand">
      <div class="mf-logo">MF</div>
      <div>
        <h1 class="mf-title">Admin login</h1>
        <p class="mf-sub">Sign in to open the MegaForm dashboard, builder, submissions, and logs.</p>
      </div>
    </div>


    <form method="post" action="/admin/login">
      <input name="__RequestVerificationToken" type="hidden" value="CfDJ8ClUaks4bJZBvv57BE5-7gBB1shcT6r-Li9vwM3fZ7LjpSf7-4EQw_B4LhSyaHWW8bRrntQFraoFTytEjYyy4Rp2N_AaVuIs3ZC58Vvm6P-fHRcvGedVgDeGm3VkvP8Lt6KJX5rN5sx8_60vMeelhsc" />
      <input type="hidden" name="returnUrl" value="/admin" />
      <div class="mf-field">
        <label class="mf-label" for="usernameOrEmail">Username or email</label>
        <input class="mf-input" id="usernameOrEmail" name="usernameOrEmail" type="text" autocomplete="username" required />
      </div>
      <div class="mf-field">
        <label class="mf-label" for="password">Password</label>
        <input class="mf-input" id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="mf-row">
        <label class="mf-check"><input type="checkbox" name="rememberMe" value="true" /> Remember me</label>
        <a href="/setup" style="font-size:13px;color:#2563eb;text-decoration:none;">Setup</a>
      </div>
      <button class="mf-btn" type="submit">Sign in</button>
    </form>

    <div class="mf-foot">Use the administrator account created during setup.</div>
  </div>
</body>
</html>
