<style>

  .mf-gm-side .nav:hover { background: #ebebeb; }
  .mf-gm-side .nav.active { background: #d3e3fd; font-weight: 700; color: #001d35; }
  .mf-gm-side .nav .ico { width: 22px; margin-right: 14px; color: #5f6368; }

                             padding: 1px 7px; border-radius: 10px; font-weight: 700; min-width: 18px; text-align: center; }
  .mf-gm-side .nav.active .count { background: #001d35; color: #fff; }
  .mf-gm-side .nav .count:empty { display: none; }

  .mf-gm-main { background: #fff; border-radius: 16px 0 0 0; overflow: hidden;
                display: flex; flex-direction: column; min-width: 0; }
  .mf-gm-tools { height: 48px; display: flex; align-items: center; padding: 0 16px; gap: 4px;
                  border-bottom: 1px solid #f1f3f4; }

                        cursor: pointer; color: #5f6368; }
  .mf-gm-tools .btn:hover { background: #f1f3f4; }
  .mf-gm-tools .pager { margin-left: auto; display: inline-flex; align-items: center;
                        gap: 4px; color: #5f6368; font-size: 12px; }

  .mf-gm-list { flex: 1; overflow-y: auto; background: #fff; }

  .mf-gm-row { display: flex; align-items: center; height: 40px; padding: 0 16px;
                font-size: 14px; cursor: pointer; border-bottom: 1px solid #f1f3f4;
                background: #fff; }
  .mf-gm-row.unread { font-weight: 700; }
  .mf-gm-row.read { background: #f6f8fc; color: #5f6368; font-weight: 400; }
  .mf-gm-row:hover { box-shadow: inset 0 0 0 1px #dadce0, 0 1px 3px rgba(60,64,67,.18); position: relative; z-index: 2; }
  .mf-gm-row .cb, .mf-gm-row .star, .mf-gm-row .imp { width: 28px; height: 28px;
                  display: inline-flex; align-items: center; justify-content: center;
                  color: #5f6368; flex-shrink: 0; }
  .mf-gm-row .star { color: #dadce0; }
  .mf-gm-row .sender { width: 200px; padding: 0 8px; white-space: nowrap;
                       overflow: hidden; text-overflow: ellipsis; }
  .mf-gm-row .content { flex: 1; display: flex; align-items: center; overflow: hidden;
                        padding: 0 8px; gap: 8px; }
  .mf-gm-row .subject { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mf-gm-row .snippet { color: #5f6368; font-weight: 400; white-space: nowrap;
                        overflow: hidden; text-overflow: ellipsis; }
  .mf-gm-row .pill { display: inline-block; padding: 1px 7px; border-radius: 4px;
                     background: #e8eaed; color: #5f6368; font-size: 11px;
                     font-weight: 500; margin-right: 6px; }
  .mf-gm-row .pill.annual { background: #e3f2fd; color: #1565c0; }
  .mf-gm-row .pill.sick   { background: #ffebee; color: #c62828; }
  .mf-gm-row .pill.personal { background: #f3e5f5; color: #6a1b9a; }
  .mf-gm-row .pill.unpaid { background: #fff8e1; color: #ef6c00; }
  .mf-gm-row .time { width: 90px; text-align: right; font-size: 12px;
                     color: #5f6368; flex-shrink: 0; }

  .mflv-wrapper-empty { padding: 80px 24px; text-align: center; color: #5f6368;
                         font-size: 14px; line-height: 1.6; }
  .mflv-wrapper-empty::before { content: '📭'; display: block; font-size: 48px;
                                margin-bottom: 12px; opacity: .55; }

  .mf-gm-rail { padding: 8px 6px; display: flex; flex-direction: column;
                align-items: center; gap: 8px; background: #f6f8fc;
                border-left: 1px solid #ecedef; }
  .mf-gm-rail .ico { width: 32px; height: 32px; border-radius: 50%;
                     background: #fff; display: inline-flex; align-items: center;
                     justify-content: center; cursor: pointer;
                     box-shadow: 0 1px 2px rgba(0,0,0,.12); color: #5f6368; }
  .mf-gm-rail .ico:hover { background: #f1f3f4; }
</style>

<div class="mf-gm" data-mf-card-badge="LeaveGmailInbox v20260517-01">
  <header class="mf-gm-top">
    <span class="menu" title="Menu">≡</span>
    <div class="brand">
      <span class="brand-logo">L</span>
      <span>Leave Inbox</span>
    </div>
    <div class="search">
      <span>🔍</span>
      <input type="search" placeholder="Search leave requests" />
      <span>⚙</span>
    </div>
    <span class="gear" title="Support">?</span>
    <span class="gear" title="Settings">⚙</span>
    <span class="gear" title="Apps">⋮⋮</span>
    <span class="avatar">H</span>
  </header>

  <div class="mf-gm-body">
    <aside class="mf-gm-side">
      <button class="compose" type="button" data-mf-act="add"><span class="plus">+</span> New request</button>

      <div class="lbl-group">Status</div>

      <div class="lbl-group">By leave type</div>

<script>
(function(){
  var dateFilter = window.__mfLeaveDateFilter || '';
  window.__mfLeaveDateFilter = dateFilter;

  function bucketFor(row, today, weekEnd){
    var due  = row.getAttribute('data-mf-due');
    var recv = row.getAttribute('data-mf-recv');
    var dueDate  = due  ? new Date(due  + 'T00:00:00') : null;
    var recvDate = recv ? new Date(recv + 'T00:00:00') : null;
    var b = [];
    if (dueDate) {
      if (dueDate < today) b.push('overdue');
      else if (dueDate.getTime() === today.getTime()) b.push('due-today');
      if (dueDate >= today && dueDate <= weekEnd) b.push('due-week');
    }
    if (recvDate && recvDate.getTime() === today.getTime()) b.push('recv-today');
    return b;
  }
  function applyDateFilter(){
    var rows = document.querySelectorAll('.mflv-shell .mf-gm-row');
    if (!rows.length) return;
    var today = new Date(); today.setHours(0,0,0,0);
    var weekEnd = new Date(today.getTime() + 7*24*3600*1000);
    var counts = { 'overdue': 0, 'due-today': 0, 'due-week': 0, 'recv-today': 0 };
    rows.forEach(function(row){
      var b = bucketFor(row, today, weekEnd);
      b.forEach(function(k){ counts[k] = (counts[k]||0) + 1; });
      if (!dateFilter) { row.style.display = ''; return; }
      row.style.display = (b.indexOf(dateFilter) >= 0) ? '' : 'none';
    });
    Object.keys(counts).forEach(function(k){
      document.querySelectorAll('[data-mf-date-count="' + k + '"]').forEach(function(el){
        el.textContent = counts[k] > 0 ? String(counts[k]) : '';
      });
    });
  }

  function wireGmail(wrapSelector){
    var shell = document.querySelector('.mflv-shell');
    var wrap  = document.querySelector(wrapSelector);
    if (!shell || !wrap) return;
    var search = shell.querySelector('.mflv-search-input');
    var addBtn = shell.querySelector('.mflv-add-btn, [data-mflv-action="add"]');
    var current = (search && search.value || '').trim();
    wrap.querySelectorAll('[data-mf-filter]').forEach(function(nav){
      nav.style.cursor = 'pointer';
      var f = (nav.getAttribute('data-mf-filter') || '').trim();
      if (f === current && !dateFilter) nav.classList.add('active'); else nav.classList.remove('active');
      nav.addEventListener('click', function(){
        dateFilter = ''; window.__mfLeaveDateFilter = '';
        if (!search) return;
        search.value = f;
        search.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
    wrap.querySelectorAll('[data-mf-date]').forEach(function(nav){
      nav.style.cursor = 'pointer';
      var d = nav.getAttribute('data-mf-date') || '';
      if (d === dateFilter) nav.classList.add('active'); else nav.classList.remove('active');
      nav.addEventListener('click', function(){
        dateFilter = (dateFilter === d) ? '' : d;
        window.__mfLeaveDateFilter = dateFilter;
        if (search && search.value) {
          search.value = '';
          search.dispatchEvent(new Event('input', { bubbles: true }));
        } else {
          wrap.querySelectorAll('[data-mf-date]').forEach(function(n){
            n.classList.toggle('active', n.getAttribute('data-mf-date') === dateFilter);
          });
          applyDateFilter();
        }
      });
    });
    wrap.querySelectorAll('[data-mf-act="add"]').forEach(function(el){
      el.style.cursor = 'pointer';
      el.addEventListener('click', function(){ if (addBtn) addBtn.click(); });
    });
    wrap.querySelectorAll('[data-mf-act="refresh"]').forEach(function(el){
      el.style.cursor = 'pointer';
      el.addEventListener('click', function(){
        dateFilter = ''; window.__mfLeaveDateFilter = '';
        if (search) search.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
    wrap.querySelectorAll('[data-mf-act="focus-search"]').forEach(function(el){
      el.style.cursor = 'pointer';
      el.addEventListener('click', function(){ if (search) { search.focus(); search.select(); } });
    });
    applyDateFilter();
  }
  wireGmail('.mf-gm');
})();
</script>
