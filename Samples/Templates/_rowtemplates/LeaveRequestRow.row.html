<div class="mf-gm-row unread"
     data-mflv-action="view"
     data-mflv-id="{{submission:id}}"
     data-mf-status="{{submission:status}}"
     data-mf-due="{{field:to_date|format=yyyy-MM-dd}}"
     data-mf-recv="{{field:from_date|format=yyyy-MM-dd}}">
  <span class="cb">▢</span>
  <span class="star">★</span>
  <span class="imp">›</span>
  <div class="sender">{{field:employee_name}}</div>
  <div class="content">
    <span class="pill {{field:leave_type|format=lower}}">{{field:leave_type}}</span>
    <span class="subject">{{field:leave_type}} request · {{field:from_date|format=dd/MM}} → {{field:to_date|format=dd/MM}}</span>
    <span class="snippet">— {{field:reason}}</span>
  </div>
  <div class="time">{{field:to_date|format=dd MMM}}</div>
</div>
