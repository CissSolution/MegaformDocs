  assemblies:
  - MegaForm.Sdk
  namespace: MegaForm.Sdk
  summary: >-
    Register <xref href="MegaForm.Sdk.IMegaFormClient" data-throw-if-not-resolved="false"></xref>. The host must already have registered the

    MegaForm.Core repositories (<code>IFormRepository</code>, <code>ISubmissionRepository</code>) —

    every MegaForm host (Oqtane / Web / DNN) does this. <code>IPlatformContext</code> is used

    when present for ambient tenant/user; otherwise callers pass a <xref href="MegaForm.Sdk.MegaFormScope" data-throw-if-not-resolved="false"></xref>.
  example: []
