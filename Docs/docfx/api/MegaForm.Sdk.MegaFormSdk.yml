  assemblies:
  - MegaForm.Sdk
  namespace: MegaForm.Sdk
  summary: >-
    Ambient accessor for hosts that cannot use constructor injection — e.g. a DNN Razor

    host, a DDR template, or a legacy .ascx. Call <xref href="MegaForm.Sdk.MegaFormSdk.Initialize(System.IServiceProvider)" data-throw-if-not-resolved="false"></xref> once at host

    startup with the application's <xref href="System.IServiceProvider" data-throw-if-not-resolved="false"></xref>, then use

    <xref href="MegaForm.Sdk.MegaFormSdk.RunAsync%60%601(System.Func%7bMegaForm.Sdk.IMegaFormClient%2cSystem.Threading.Tasks.Task%7b%60%600%7d%7d)" data-throw-if-not-resolved="false"></xref> which opens a DI scope, resolves the client, and disposes it.


    <pre><code class="lang-csharp">// DNN razor host:

    var forms = await MegaFormSdk.RunAsync(c =&gt; c.Forms.ListFormsAsync(
        new FormQuery { Status = "published" },
        new MegaFormScope { PortalId = PortalSettings.PortalId }));</code></pre>

    In DI hosts (Oqtane/Web), prefer injecting <xref href="MegaForm.Sdk.IMegaFormClient" data-throw-if-not-resolved="false"></xref> directly.
