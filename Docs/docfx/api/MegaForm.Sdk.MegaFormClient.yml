  assemblies:
  - MegaForm.Sdk
  namespace: MegaForm.Sdk
  summary: >-
    Create a client. <code class="paramref">platform</code>/<code class="paramref">files</code>/<code class="paramref">storage</code>

    are optional — when platform is null, every call must pass an explicit <xref href="MegaForm.Sdk.MegaFormScope" data-throw-if-not-resolved="false"></xref>;

    file APIs need files+storage. <code class="paramref">submissionProcessor</code> is optional: when supplied

    (the host registered it in DI), <code>SubmitAsync</code> runs the FULL submission pipeline (validate +

    anti-spam + notify + workflow + index), identical to a public form submit; when null, it falls

    back to validate-then-insert.
  example: []
  syntax:
