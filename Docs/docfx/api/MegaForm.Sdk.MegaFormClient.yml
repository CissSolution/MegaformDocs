  namespace: MegaForm.Sdk
  summary: >-
    Default <xref href="MegaForm.Sdk.IMegaFormClient" data-throw-if-not-resolved="false"></xref> — a thin facade that maps SDK DTOs to/from

    MegaForm.Core repositories. It does NOT contain business logic; it reuses Core.

    Tenant/user context comes from the ambient <xref href="MegaForm.Core.Interfaces.IPlatformContext" data-throw-if-not-resolved="false"></xref> (when the

    host provides one) and can be overridden per call via <xref href="MegaForm.Sdk.MegaFormScope" data-throw-if-not-resolved="false"></xref>.
  example: []
