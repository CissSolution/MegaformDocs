  source:
    id: SubmitAsync
    path: E:\_sdkwt\MegaForm.Sdk\IMegaFormClient.cs
    startLine: 98
  assemblies:
  - MegaForm.Sdk
  namespace: MegaForm.Sdk
  summary: >-
    Submit form data, running the same server-side validation as a public form submit.

    When the host registered the full submission pipeline (anti-spam, notifications,

    workflow), this delegates to it; otherwise it validates and inserts the row. On a

    validation failure the result's <xref href="MegaForm.Sdk.SubmitResult.Success" data-throw-if-not-resolved="false"></xref> is false and no

    row is saved.
  example: []
  syntax:
    content: Task<SubmitResult> SubmitAsync(int formId, Dictionary<string, object> data, MegaFormScope? scope = null, CancellationToken cancellationToken = default)
    parameters:
    - id: formId
      type: System.Int32
    - id: data
      type: System.Collections.Generic.Dictionary{System.String,System.Object}
    - id: scope
      type: MegaForm.Sdk.MegaFormScope
    - id: cancellationToken
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{MegaForm.Sdk.SubmitResult}
    content.vb: Function SubmitAsync(formId As Integer, data As Dictionary(Of String, Object), scope As MegaFormScope = Nothing, cancellationToken As CancellationToken = Nothing) As Task(Of SubmitResult)
